services:
  api:
    build: .
    environment:
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
      POSTGRES_DB: "devcollabDB"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d devcollabDB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
