services:
  api:
    build: .
    environment:
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432

    ports:
      - "8000:8000"

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
      POSTGRES_DB: "devcollabDB"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
